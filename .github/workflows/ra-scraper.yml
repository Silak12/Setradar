name: RA Scraper

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      weeks:
        description: "How many weeks ahead to fetch"
        required: false
        default: "10"
        type: string
      dry_run:
        description: "Skip Supabase seeding and only write the JSON output"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run scraper
        env:
          WEEKS: ${{ github.event_name == 'workflow_dispatch' && inputs.weeks || '10' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
        run: |
          set -euo pipefail
          OUTPUT="backend/fetcher/lineup_seed_example.generated.json"
          ARGS=(--weeks "$WEEKS" --output "$OUTPUT")
          if [ "$DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python backend/fetcher/ra_scraper.py "${ARGS[@]}"

      - name: Upload generated JSON
        if: ${{ always() && hashFiles('backend/fetcher/lineup_seed_example.generated.json') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: ra-scraper-output
          path: backend/fetcher/lineup_seed_example.generated.json
