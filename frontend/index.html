<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SETRADAR — Berlin</title>
  <meta name="description" content="Wer spielt wann wo. Berlin Techno Timetables." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#080808" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
  <div id="navbar"></div>

  <div class="status-bar" id="statusBar">
    <div class="status-bar-left">
      <span class="status-live-dot"></span>
      <span>Live</span>
    </div>
    <div class="status-bar-right">—</div>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <div class="search-container">
      <div class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <input id="searchInput" class="search-input" type="text"
        placeholder="SUCHEN..." autocomplete="off" spellcheck="false" />
      <button class="search-clear" id="searchClear" aria-label="Clear">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <section class="popular-rail" id="popularRail"></section>

  <nav class="date-nav" id="dateNav"></nav>
  <div class="event-sort-bar" id="eventSortBar" aria-label="Sortierung">
    <button class="event-sort-btn active" type="button" data-sort-mode="interested">Interessiert</button>
    <button class="event-sort-btn" type="button" data-sort-mode="time">Uhrzeit</button>
    <button class="event-sort-btn" type="button" data-sort-mode="score">Score</button>
  </div>

  <main id="mainContent">
    <div class="loading-screen">
      <div class="loading-bar"></div>
      <span>Lade Events</span>
    </div>
  </main>

  <div id="footer"></div>

  <!-- Artist Popup Overlay -->
  <div class="artist-overlay" id="artistOverlay" aria-hidden="true">
    <div class="artist-overlay-bg" id="artistOverlayBg"></div>
    <div class="artist-modal" id="artistModal" role="dialog" aria-modal="true">
      <div class="modal-glitch-bar"></div>
      <button class="modal-close" id="modalClose" aria-label="Schließen">
        <span>ESC</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <div class="auth-overlay" id="authOverlay" aria-hidden="true">
    <div class="auth-overlay-bg" id="authOverlayBg"></div>
    <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
      <div class="auth-modal-topline"></div>
      <button class="auth-close" id="authModalClose" type="button" aria-label="Schließen">
        <span>ESC</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="auth-content">
        <div class="auth-eyebrow">Account</div>
        <h2 class="auth-title" id="authTitle">Join the Radar</h2>
        <div class="auth-switcher" role="tablist" aria-label="Auth Modus">
          <button class="auth-tab active" id="authModeLogin" type="button" data-auth-mode="login">Login</button>
          <button class="auth-tab" id="authModeSignup" type="button" data-auth-mode="signup">Signup</button>
        </div>
        <form class="auth-form" id="authForm">
          <label class="auth-field">
            <span>E-Mail</span>
            <input id="authEmail" name="email" type="email" autocomplete="email" required />
          </label>
          <label class="auth-field auth-field-optional" id="authDisplayNameRow">
            <span>Name</span>
            <input id="authDisplayName" name="display_name" type="text" autocomplete="nickname" />
          </label>
          <label class="auth-field">
            <span>Passwort</span>
            <input id="authPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <div class="auth-message" id="authMessage" aria-live="polite"></div>
          <button class="auth-submit" id="authSubmit" type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Rating Modal -->
  <div class="rating-overlay" id="ratingOverlay" aria-hidden="true">
    <div class="rating-overlay-bg" id="ratingOverlayBg"></div>
    <div class="rating-modal" role="dialog" aria-modal="true" aria-labelledby="ratingTitle">
      <div class="rating-modal-topline"></div>
      <button class="rating-close" id="ratingModalClose" type="button" aria-label="Schlie&szlig;en">
        <span>ESC</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
      <div class="rating-content">
        <div class="rating-eyebrow">// BEWERTUNG</div>
        <div class="rating-act-name" id="ratingActName">—</div>
        <div class="rating-event-name" id="ratingEventName">—</div>
        <div class="rating-stars" id="ratingStars" role="group" aria-label="Bewertung">
          <button class="rating-star" data-star="1" type="button" aria-label="1 Stern">&#9733;</button>
          <button class="rating-star" data-star="2" type="button" aria-label="2 Sterne">&#9733;</button>
          <button class="rating-star" data-star="3" type="button" aria-label="3 Sterne">&#9733;</button>
          <button class="rating-star" data-star="4" type="button" aria-label="4 Sterne">&#9733;</button>
          <button class="rating-star" data-star="5" type="button" aria-label="5 Sterne">&#9733;</button>
        </div>
        <div class="rating-flags">
          <label class="rating-flag-label">
            <input type="checkbox" id="ratingFlagSurprise" />
            <span>Überraschung des Abends</span>
          </label>
        </div>
        <div class="rating-message" id="ratingMessage" aria-live="polite"></div>
        <button class="rating-submit" id="ratingSubmit" type="button" disabled>Bewerten</button>
      </div>
    </div>
  </div>

  <!-- Live Mode Panel (Phase 2) -->
  <div id="livePanel" class="live-panel" aria-hidden="true" aria-label="Live Mode"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/components.js"></script>
  <script src="js/event-cards.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
